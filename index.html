    .add-main-card{padding:12px;border-color:#e5c893;background:linear-gradient(180deg,#fffaf0 0%,#fffefa 100%);box-shadow:0 7px 18px rgba(120,72,18,.045)}.add-main-card>.label{margin-bottom:8px;color:#6d6257;font-size:13px;font-weight:900}.add-title-field{height:50px!important;border-width:1.6px!important;border-color:#e2d2bc!important;border-radius:16px!important;background:#fff!important;font-size:17px!important;font-weight:850}.add-field-label{margin:13px 0 7px;color:var(--muted);font-size:12px;font-weight:850}.add-memo-shell{display:block;min-height:74px;padding:10px 12px;border:1px solid #ecd9b9;border-radius:14px;background:#fffaf0}.add-memo-field{min-height:calc(var(--memo-line)*var(--memo-min-lines))!important;color:var(--muted);font-size:13px;font-weight:700}.step-settings-card{padding:12px}.step-settings-card>.card-label{margin-bottom:12px;color:#6d6257;font-size:13px;font-weight:900}.settings-grid{display:grid;gap:16px}.setting-section{display:grid;gap:8px}.setting-section>.label{margin:0;color:var(--muted);font-size:12px;font-weight:850}.setting-section .small-check{margin-top:1px}.gear-panel.open{gap:13px}.gear-section{gap:7px}.gear-section+.gear-section{margin-top:1px}

    html{scrollbar-gutter:stable both-edges;scrollbar-width:thin;scrollbar-color:rgba(116,107,96,.24) transparent}body{display:block}.app{margin:0 auto}*{scrollbar-width:thin;scrollbar-color:rgba(116,107,96,.24) transparent}*::-webkit-scrollbar{width:6px;height:6px}*::-webkit-scrollbar-track{background:transparent}*::-webkit-scrollbar-thumb{background:rgba(116,107,96,.24);border-radius:999px}*::-webkit-scrollbar-thumb:hover{background:rgba(116,107,96,.38)}.add-type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:0 0 10px}.memo-help{margin:-2px 0 7px;color:var(--muted);font-size:11.5px;font-weight:750;line-height:1.35}.memo-help span{display:block}.edit-type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:-2px 0 10px}.edit-type-row .chip{min-height:36px}.memo-edit-block{margin:0 0 9px}.memo-edit-block.standalone{margin:0 0 10px}.memo-edit-block .add-field-label{margin:0 0 4px}.memo-edit-block .memo-help{margin:0 0 7px}.memo-edit-shell{display:block;grid-template-columns:none}.memo-edit-shell .memo-field{width:100%}.step-settings-card .settings-grid{gap:16px}.task-top.no-meta{margin-bottom:8px}.task-top.no-meta .task-title{max-width:100%}


    /* v0.6.16 stable edit-mode form */
    .gear{display:inline-grid;place-items:center;color:var(--muted);font-size:0;line-height:0}
    .gear svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .gear.on{border-color:#e7b55f;background:var(--warm);color:var(--accent-dark)}
    .edit-form{display:grid;gap:10px}
    .edit-top{display:grid;grid-template-columns:1fr 36px;gap:9px;align-items:start;margin-bottom:0}
    .edit-top .gear{width:36px;height:36px;border-radius:13px}
    .edit-type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:0}
    .edit-type-row .chip{min-height:36px}
    .edit-title-field{height:50px!important;border-width:1.6px!important;border-color:#e2d2bc!important;border-radius:16px!important;background:#fff!important;font-size:17px!important;font-weight:850!important;letter-spacing:-.02em!important}
    .edit-divider{height:1px;background:var(--line);margin:3px 0 2px}
    .edit-settings{display:grid;gap:16px}
    .edit-actions{display:grid;gap:8px;margin-top:0}
    .edit-actions .putaway-btn,.edit-actions .delete-btn{margin-top:0}

    .memo-help span+span{margin-top:1px}

    .add-title-field::placeholder,.edit-title-field::placeholder,.memo-field::placeholder{font-weight:500!important;color:rgba(116,107,96,.68)!important}

    .now-head{margin-bottom:9px}

<body>
  <main class="app">
    <header>
      <div>
        <h1>스텝 <span class="version">v0.6.17</span></h1>
        <p class="subtitle" id="subtitle">지금 할 것만 보기</p>
      </div>
      <button class="top-btn" id="topBtn">＋</button>
    </header>

    <section id="doView" class="view active">
      <section class="card focus" id="currentCard"></section>
      <section class="library" id="listCard"></section>
    </section>

    <section id="addView" class="view">
      <section class="card add-main-card">
        <div class="label">새 할 일</div>
        <div class="add-type-row">
          <button class="chip" data-type="0">공부</button>
          <button class="chip" data-type="1">과제</button>
          <button class="chip" data-type="2">기타</button>
        </div>
        <input id="taskInput" class="add-title-field" type="text" placeholder="예: 회로 과제 3번 풀기" autocomplete="off" />
        <div class="add-field-label">메모</div>
        <div class="memo-help" id="memoHelp"></div>
        <label class="add-memo-shell">
          <textarea id="memoInput" class="memo-field add-memo-field" rows="2"></textarea>
        </label>
      </section>
      <section class="card step-settings-card">
        <div class="label card-label">스텝 설정</div>
        <div class="settings-grid">
          <div class="setting-section">
            <div class="label">시작·끝 기준</div>
            <div class="range-box">
              <label class="range-row">
                <span>시작</span>
                <input id="startInput" type="text" placeholder="처음 볼 곳이나 손댈 것" autocomplete="off" />
              </label>
              <label class="range-row">
                <span>끝</span>
                <input id="finishInput" type="text" placeholder="이번에 어디까지 할지" autocomplete="off" />
              </label>
            </div>
            <label class="small-check"><input id="prepInput" type="checkbox" /><span>준비부터 필요함</span><small>첫 스텝을 준비로 시작</small></label>
          </div>

              <button class="chip" data-count="2">2스텝<small>1시간</small></button>
              <button class="chip" data-count="3">3스텝<small>1.5시간</small></button>
              <button class="chip" data-count="4">4스텝<small>2시간</small></button>
              <button class="chip" data-count="5">5스텝<small>2.5시간</small></button>
              <button class="chip" data-count="6">6스텝<small>3시간</small></button>

    </section>
  </main>

  <div class="toast" id="toast"></div>
  <div class="celebration" id="celebration"><span class="check">✓</span><span>할 일 완료</span></div>

  <script>
    var KEY="step_live_v1";
    var TYPE={STUDY:0,ASSIGNMENT:1,ETC:2};
    var TYPE_NAMES=["공부","과제","기타"];
    var STATUS={PENDING:"pending",SUCCESS:"success",INCOMPLETE:"incomplete",BLOCKED:"blocked"};
    var KIND={PREP:"prep",START:"start",CONTINUE:"continue",WRAP:"wrap",SUBMIT:"submit",INCOMPLETE:"incomplete",BLOCKED:"blocked"};
    var TIMER={FOCUS:"focus",BREAK:"break",OFF:"off"};
    var TIMER_MS={focus:25*60*1000,break:5*60*1000};
    var CIRCLE_LEN=150.8;
    var HOLD_MS=1150;
    var TIMER_HOLD_MS=800;
    var MEMO_LINE=18;
    var MEMO_MIN_LINES=2;
    var MEMO_MAX_LINES=6;
    var MEMO_MAX_HEIGHT=MEMO_LINE*MEMO_MAX_LINES;
    var MEMO_TOLERANCE=2;
    var state=loadState();
    var armedDeleteId=null;
    var toastTimer=null;
    var celebrationTimer=null;
    var timerTick=null;
    var timerFlashTimer=null;
    var titleBeforeEdit="";
    var el={
      subtitle:byId("subtitle"),doView:byId("doView"),addView:byId("addView"),topBtn:byId("topBtn"),
      taskInput:byId("taskInput"),startInput:byId("startInput"),memoInput:byId("memoInput"),memoHelp:byId("memoHelp"),finishInput:byId("finishInput"),prepInput:byId("prepInput"),addBtn:byId("addBtn"),
      currentCard:byId("currentCard"),listCard:byId("listCard"),toast:byId("toast"),celebration:byId("celebration")
    };

    function byId(id){return document.getElementById(id)}
    function all(selector,root){return Array.prototype.slice.call((root||document).querySelectorAll(selector))}
    function baseTimer(){return{mode:TIMER.FOCUS,running:false,startedAt:null,elapsed:0}}
    function baseState(){return{screen:"do",draft:"",startText:"",memoText:"",finishText:"",type:TYPE.STUDY,count:1,prep:false,activeId:null,libraryOpen:false,timer:baseTimer(),tasks:[]}}
    function storageGet(key){try{return localStorage.getItem(key)}catch(e){return null}}
    function storageSet(key,value){try{localStorage.setItem(key,value)}catch(e){}}
    function loadState(){
      var raw=storageGet(KEY);
      if(!raw)return baseState();
      try{return normalizeState(JSON.parse(raw))}catch(e){return baseState()}
    }
    function saveState(){storageSet(KEY,JSON.stringify(state))}
    function normalizeState(saved){
      var next=baseState(); saved=saved||{};
      next.screen=saved.screen==="add"?"add":"do";
      next.draft=str(saved.draft); next.startText=str(saved.startText); next.memoText=str(saved.memoText); next.finishText=str(saved.finishText);
      next.type=clamp(saved.type,TYPE.STUDY,TYPE.ETC); next.count=clamp(saved.count,1,6); next.prep=!!(saved.prep||saved.criteria&&saved.criteria.unclear);
      next.libraryOpen=!!saved.libraryOpen; next.tasks=Array.isArray(saved.tasks)?saved.tasks.map(normalizeTask).filter(Boolean):[];
      next.activeId=saved.activeId&&findTaskInList(String(saved.activeId),next.tasks)?String(saved.activeId):null;
      next.timer=normalizeTimer(saved.timer);
      return next;
    }
    function normalizeTimer(raw){
      raw=raw||{};
      var mode=raw.mode===TIMER.BREAK?TIMER.BREAK:raw.mode===TIMER.OFF?TIMER.OFF:TIMER.FOCUS;
      var elapsed=Number(raw.elapsed||0);
      var startedAt=raw.startedAt?Number(raw.startedAt):null;
      return{mode:mode,running:!!raw.running&&mode!==TIMER.OFF,startedAt:startedAt,elapsed:isFinite(elapsed)&&elapsed>0?elapsed:0};
    }
    function normalizeTask(raw){
      if(!raw)return null;
      var title=clean(raw.title||"할 일")||"할 일";
      var task={id:String(raw.id||uid()),title:title,startText:clean(raw.startText),memoText:cleanMemo(raw.memoText),finishText:clean(raw.finishText),type:clamp(raw.type,TYPE.STUDY,TYPE.ETC),prep:!!(raw.prep||raw.criteria&&raw.criteria.unclear),count:clamp(raw.count||1,1,6),now:0,view:0,settingsOpen:!!raw.settingsOpen,pieces:[]};
      var oldPieces=Array.isArray(raw.pieces)?raw.pieces:[];
      task.pieces=oldPieces.length?oldPieces.map(function(piece,index){return normalizePiece(piece,task,index,oldPieces)}).filter(Boolean):makePieces(task);
      if(!task.pieces.length)task.pieces=makePieces(task);
      refreshKinds(task);
      recalcTask(task);
      task.view=clamp(typeof raw.view==="number"?raw.view:task.now,0,Math.max(task.pieces.length-1,0));
      return task.pieces.length?task:null;
    }
    function normalizePiece(piece,task,index,pieces){if(!piece)return null;return{status:validStatus(piece.status),kind:validKind(piece.kind)||inferredKind(task,index,pieces),done:doneFlags(piece)}}
    function doneFlags(piece){var flags=[];if(Array.isArray(piece.done)){flags=piece.done.map(Boolean)}else if(Array.isArray(piece.steps)){flags=piece.steps.map(function(step){return!!step.done})}while(flags.length<3)flags.push(false);return flags.slice(0,3)}
    function inferredKind(task,index,pieces){
      var prev=index>0?pieces[index-1]:null, current=pieces[index], prevStatus=prev?validStatus(prev.status):"", currentStatus=current?validStatus(current.status):STATUS.PENDING;
      if(currentStatus===STATUS.PENDING&&prevStatus===STATUS.INCOMPLETE)return KIND.INCOMPLETE;
      if(currentStatus===STATUS.PENDING&&prevStatus===STATUS.BLOCKED)return KIND.BLOCKED;
      return kindForNewPiece(task,index,pieces.length);
    }
    function validStatus(status){return[STATUS.PENDING,STATUS.SUCCESS,STATUS.INCOMPLETE,STATUS.BLOCKED].indexOf(status)>=0?status:STATUS.PENDING}
    function validKind(kind){return[KIND.PREP,KIND.START,KIND.CONTINUE,KIND.WRAP,KIND.SUBMIT,KIND.INCOMPLETE,KIND.BLOCKED].indexOf(kind)>=0?kind:""}
    function clamp(value,min,max){value=Number(value);if(!isFinite(value))value=min;return Math.max(min,Math.min(max,Math.round(value)))}
    function uid(){return"t-"+Date.now()+"-"+Math.random().toString(16).slice(2)}
    function str(value){return String(value||"")}
    function clean(text){return str(text).trim().replace(/\s+/g," ")}
    function cleanMemo(text){return str(text).trim()}
    function safe(text){return str(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
    function attr(text){return safe(text).replace(/"/g,"&quot;")}
    function toast(message){if(toastTimer)clearTimeout(toastTimer);el.toast.textContent=message;el.toast.classList.add("show");toastTimer=setTimeout(function(){el.toast.classList.remove("show")},1300)}
    function showCelebration(){if(celebrationTimer)clearTimeout(celebrationTimer);el.celebration.classList.remove("show");void el.celebration.offsetWidth;el.celebration.classList.add("show");celebrationTimer=setTimeout(function(){el.celebration.classList.remove("show")},1250)}
    function autoGrow(node){
      if(!node)return;
      node.style.height="auto";
      var wanted=Math.max(node.scrollHeight,MEMO_LINE*MEMO_MIN_LINES);
      if(wanted<=MEMO_MAX_HEIGHT+MEMO_TOLERANCE){
        node.style.height=wanted+"px";
        node.style.overflowY="hidden";
      }else{
        node.style.height=MEMO_MAX_HEIGHT+"px";
        node.style.overflowY="auto";
      }
    }
    function autoGrowAll(){all("textarea.memo-field").forEach(autoGrow)}
    function findTask(taskId){return findTaskInList(taskId,state.tasks)}
    function findTaskInList(taskId,list){taskId=str(taskId);for(var i=0;i<list.length;i++){if(list[i].id===taskId)return list[i]}return null}
    function activeTask(){return findTask(state.activeId)}
    function storedTasks(){return state.tasks.filter(function(task){return task.id!==state.activeId})}
    function firstPendingIndex(pieces){for(var i=0;i<pieces.length;i++){if(pieces[i].status===STATUS.PENDING)return i}return pieces.length}
    function findLastPendingIndex(task){for(var i=task.pieces.length-1;i>=0;i--){if(task.pieces[i].status===STATUS.PENDING)return i}return-1}
    function completedCount(task){return task.pieces.filter(function(piece){return piece.status!==STATUS.PENDING}).length}
    function taskHasStarted(task){
      if(!task||!Array.isArray(task.pieces))return false;
      return task.pieces.some(function(piece){return piece.status!==STATUS.PENDING||(Array.isArray(piece.done)&&piece.done.some(Boolean))});
    }
    function canEditPrep(task){return !taskHasStarted(task)}
    function isTaskDone(task){return!!task&&task.pieces.length>0&&firstPendingIndex(task.pieces)>=task.pieces.length}
    function recalcTask(task){task.now=firstPendingIndex(task.pieces);task.count=task.pieces.length;task.view=task.pieces.length?(task.now<task.pieces.length?task.now:task.pieces.length-1):0}
    function viewPiece(task){if(!task||!task.pieces.length)return null;return task.pieces[clamp(task.view,0,task.pieces.length-1)]||null}
    function typeName(type){return TYPE_NAMES[clamp(type,TYPE.STUDY,TYPE.ETC)]||TYPE_NAMES[0]}
    function memoGuide(type){
      type=clamp(type,TYPE.STUDY,TYPE.ETC);
      if(type===TYPE.ASSIGNMENT)return{line1:"제출 기한 / 이어갈 곳",line2:"조건 · 채점 기준 · 참고자료",placeholder:"예: 금 23:59 / 3번 풀이 중간부터"};
      if(type===TYPE.ETC)return{line1:"시간·장소 / 이어갈 곳",line2:"준비물 · 주의할 점",placeholder:"예: 6시 학교 앞 / 챙길 것"};
      return{line1:"이어갈 곳 / 이번 목표",line2:"헷갈린 점 · 예제 · 참고자료",placeholder:"예: p.37 예제 4부터 / 헷갈린 개념"};
    }
    function renderMemoHelp(type){var guide=memoGuide(type);return'<span>'+safe(guide.line1)+'</span><span>'+safe(guide.line2)+'</span>'}
    function applyMemoGuide(){var guide=memoGuide(state.type);if(el.memoHelp)el.memoHelp.innerHTML=renderMemoHelp(state.type);if(el.memoInput)el.memoInput.placeholder=guide.placeholder}
    function typeBadge(task){return'<span class="type-pill">'+typeName(task.type)+'</span>'}
    function text(value){return{text:str(value),strong:false}}
    function strong(value){return{text:str(value),strong:true}}
    function line(){return Array.prototype.slice.call(arguments).map(function(part){return typeof part==="string"?text(part):part}).filter(function(part){return part&&clean(part.text)})}

    function stepsFor(task,piece){
      var start=clean(task.startText), finish=clean(task.finishText);
      if(piece.kind===KIND.PREP)return prepSteps(task,start,finish);
      if(piece.kind===KIND.START)return startSteps(task,start,finish);
      if(piece.kind===KIND.SUBMIT)return submitSteps();
      if(piece.kind===KIND.BLOCKED)return blockedSteps(task);
      return resumeSteps(task,finish);
    }
    function prepSteps(task,start,finish){return[start?startLine(task,start):line("첫 준비 하나를 끝낸다"),line("완성하려 하지 말고 ",strong("2분만")," 실제로 해본다"),reviewLine(task,finish)]}
    function startSteps(task,start,finish){
      if(task.type===TYPE.STUDY)return[start?startLine(task,start):line("볼 자료를 하나만 열어둔다"),line("첫 문제나 첫 문단을 ",strong("2분만")," 본다"),reviewLine(task,finish)];
      if(task.type===TYPE.ASSIGNMENT)return[start?startLine(task,start):line("과제 파일과 조건을 바로 보이게 연다"),line("완성하려 하지 말고 빈칸 하나를 채운다"),reviewLine(task,finish)];
      return[start?startLine(task,start):line("지금 손댈 대상을 눈앞에 둔다"),line("첫 동작 하나를 끝내고 멈춘다"),reviewLine(task,finish)];
    }
    function startLine(task,start){if(task.type===TYPE.STUDY)return line(strong(start),"를 열고 바로 볼 위치에 둔다");if(task.type===TYPE.ASSIGNMENT)return line(strong(start),"를 열고 바로 쓸 위치에 둔다");return line(strong(start),"부터 바로 손댄다")}
    function resumeSteps(task,finish){
      if(task.type===TYPE.STUDY)return[line("마지막으로 본 위치에서 다시 시작한다"),line("새 범위 말고 남은 한 부분만 본다"),reviewLine(task,finish)];
      if(task.type===TYPE.ASSIGNMENT)return[line("마지막으로 쓴 위치에서 다시 시작한다"),line("새 범위 말고 남은 한 부분만 채운다"),reviewLine(task,finish)];
      return[line("마지막으로 멈춘 곳에서 다시 시작한다"),line("새 일 말고 남은 한 부분만 처리한다"),reviewLine(task,finish)];
    }
    function blockedSteps(task){if(task.type===TYPE.ETC)return[line("멈춘 지점으로 돌아간다"),line("지금 할 일을 더 작게 줄인다"),line("다음 첫 동작만 적어둔다")];return[line("멈춘 위치를 다시 연다"),line("막힌 부분을 한 줄로 줄여 쓴다"),line("물어볼 질문 하나를 적어둔다")]}
    function submitSteps(){return[line("제출할 파일을 한곳에 모은다"),line("조건표에서 빠진 항목을 확인한다"),line(strong("제출 완료 화면"),"을 확인한다")]}
    function reviewLine(task,finish){
      if(task.type===TYPE.STUDY)return finish?line(strong(finish),"까지 남은 부분과 방금 잡은 핵심을 적어둔다"):line("다음에 볼 위치와 방금 잡은 핵심을 적어둔다");
      if(task.type===TYPE.ASSIGNMENT)return finish?line(strong(finish),"까지 남은 부분과 제출 전에 확인할 점을 적어둔다"):line("남은 부분과 제출 전에 확인할 점을 적어둔다");
      return finish?line(strong(finish),"까지 남은 것만 적어둔다"):line("더 해야 하면 다음 동작만 적어둔다");
    }
    function kindForNewPiece(task,index,total){if(index===0)return task.prep?KIND.PREP:KIND.START;if(index===total-1&&task.type===TYPE.ASSIGNMENT&&total>1)return KIND.SUBMIT;if(index===total-1&&total>2)return KIND.WRAP;return KIND.CONTINUE}
    function refreshKinds(task){for(var i=0;i<task.pieces.length;i++){if(task.pieces[i].kind!==KIND.INCOMPLETE&&task.pieces[i].kind!==KIND.BLOCKED)task.pieces[i].kind=kindForNewPiece(task,i,task.pieces.length)}}
    function makePieces(task){var pieces=[],total=clamp(task.count,1,6);for(var i=0;i<total;i++)pieces.push(newPiece(kindForNewPiece(task,i,total)));return pieces}
    function newPiece(kind){return{status:STATUS.PENDING,kind:kind||KIND.CONTINUE,done:[false,false,false]}}

    function resetTimer(mode){state.timer={mode:mode||TIMER.FOCUS,running:false,startedAt:null,elapsed:0}}
    function timerDuration(){return TIMER_MS[state.timer.mode]||0}
    function timerElapsed(){
      if(state.timer.mode===TIMER.OFF)return 0;
      var elapsed=Number(state.timer.elapsed||0);
      if(state.timer.running&&state.timer.startedAt)elapsed+=Date.now()-Number(state.timer.startedAt);
      return Math.max(0,elapsed);
    }
    function timerView(){
      var mode=state.timer.mode||TIMER.FOCUS;
      if(mode===TIMER.OFF)return{mode:mode,display:"",offset:CIRCLE_LEN,over:false,running:false};
      var duration=timerDuration(),elapsed=timerElapsed(),over=elapsed>duration;
      var seconds=over?Math.floor((elapsed-duration)/1000):Math.ceil(Math.max(duration-elapsed,0)/1000);
      var remainingRatio=over?0:Math.max(duration-elapsed,0)/duration;
      return{mode:mode,display:formatSeconds(seconds),offset:CIRCLE_LEN*(1-remainingRatio),over:over,running:!!state.timer.running};
    }
    function formatSeconds(totalSeconds){
      totalSeconds=Math.max(0,Math.floor(totalSeconds));
      var minutes=Math.floor(totalSeconds/60),seconds=totalSeconds%60;
      return pad2(minutes)+":"+pad2(seconds);
    }
    function pad2(value){return value<10?"0"+value:String(value)}
    function flashTimer(){
      var card=byId("timerCard");if(!card)return;
      if(timerFlashTimer)clearTimeout(timerFlashTimer);
      card.classList.remove("tap-flash");void card.offsetWidth;card.classList.add("tap-flash");
      timerFlashTimer=setTimeout(function(){card.classList.remove("tap-flash")},180);
    }
    function toggleTimer(){
      if(state.timer.mode===TIMER.OFF)return;
      if(state.timer.running){
        state.timer.elapsed=timerElapsed();
        state.timer.running=false;
        state.timer.startedAt=null;
      }else{
        state.timer.running=true;
        state.timer.startedAt=Date.now();
      }
      saveState();
      updateTimerDom();
      flashTimer();
    }
    function cycleTimerMode(){
      var next=state.timer.mode===TIMER.FOCUS?TIMER.BREAK:state.timer.mode===TIMER.BREAK?TIMER.OFF:TIMER.FOCUS;
      resetTimer(next);
      saveState();
      updateTimerDom();
    }
    function renderTimer(){
      var view=timerView();
      var cls="timer-card "+(view.mode===TIMER.BREAK?"break-mode":view.mode===TIMER.OFF?"off":"focus-mode")+(view.over?" over":"")+(view.running?"":" paused");
      return '<div class="timer-wrap"><button class="'+cls+'" id="timerCard" style="--timer-offset:'+view.offset+'" aria-label="스텝 타이머"><svg class="timer-svg" viewBox="0 0 60 60" aria-hidden="true"><circle class="timer-track" cx="30" cy="30" r="24"></circle><circle class="timer-progress" cx="30" cy="30" r="24"></circle></svg><span class="timer-text">'+safe(view.display)+'</span></button></div>';
    }
    function updateTimerDom(){
      var card=byId("timerCard");
      if(!card)return;
      var view=timerView();
      card.className="timer-card "+(view.mode===TIMER.BREAK?"break-mode":view.mode===TIMER.OFF?"off":"focus-mode")+(view.over?" over":"")+(view.running?"":" paused");
      card.style.setProperty("--timer-offset",view.offset);
      var textNode=card.querySelector(".timer-text");
      if(textNode)textNode.textContent=view.display;
    }
    function bindTimer(){
      var card=byId("timerCard");
      if(!card)return;
      var timer=null,longDone=false;
      function cleanup(){if(timer)clearTimeout(timer);timer=null;card.classList.remove("holding")}
      function start(event){
        event.preventDefault();
        cleanup();
        longDone=false;
        card.classList.add("holding");
        timer=setTimeout(function(){longDone=true;cycleTimerMode();cleanup()},TIMER_HOLD_MS);
      }
      function end(event){
        if(event)event.preventDefault();
        if(!longDone)toggleTimer();
        cleanup();
      }
      function cancel(event){if(event)event.preventDefault();cleanup()}
      card.addEventListener("pointerdown",start);
      card.addEventListener("pointerup",end);
      card.addEventListener("pointerleave",cancel);
      card.addEventListener("pointercancel",cancel);
      card.addEventListener("contextmenu",function(event){event.preventDefault()});
    }
    function startTimerLoop(){
      if(timerTick)clearInterval(timerTick);
      timerTick=setInterval(function(){
        if(state.timer&&state.timer.running)updateTimerDom();
      },500);
    }

    function addTask(){
      var title=clean(state.draft);if(!title){toast("할 일을 먼저 입력해 주세요.");return}
      var task={id:uid(),title:title,startText:clean(state.startText),memoText:cleanMemo(state.memoText),finishText:clean(state.finishText),type:state.type,prep:state.prep,count:state.count,now:0,view:0,settingsOpen:false,pieces:[]};
      task.pieces=makePieces(task);task.count=task.pieces.length;state.tasks.unshift(task);state.activeId=task.id;state.libraryOpen=false;clearDraft();resetTimer(TIMER.FOCUS);state.screen="do";
      saveState();syncInputs();renderAll();toast("할 일을 추가했어요.");
    }
    function clearDraft(){state.draft="";state.startText="";state.memoText="";state.finishText="";state.prep=false}
    function selectTask(taskId){var task=findTask(taskId);if(!task)return;armedDeleteId=null;state.activeId=task.id;state.libraryOpen=false;task.settingsOpen=false;task.view=Math.min(task.now,task.pieces.length-1);resetTimer(TIMER.FOCUS);saveState();renderAll()}
    function putAwayCurrent(){var task=activeTask();if(!task)return;task.settingsOpen=false;state.activeId=null;state.libraryOpen=false;resetTimer(TIMER.FOCUS);saveState();renderAll();toast("보관함으로 내렸어요.")}
    function openAddView(){armedDeleteId=null;state.screen="add";saveState();renderScreen();renderAddControls();syncInputs();focusTaskInput()}
    function markCurrent(status){
      var task=activeTask();if(!task||task.now>=task.pieces.length)return;
      var index=task.now;task.pieces[index].status=validStatus(status);
      if(status===STATUS.INCOMPLETE)task.pieces.splice(index+1,0,newPiece(KIND.INCOMPLETE));
      if(status===STATUS.BLOCKED)task.pieces.splice(index+1,0,newPiece(KIND.BLOCKED));
      recalcTask(task);resetTimer(TIMER.FOCUS);
      var justFinished=status===STATUS.SUCCESS&&isTaskDone(task);saveState();renderAll();if(justFinished)showCelebration();
    }
    function addOnePiece(){var task=activeTask();if(!task)return;var wasDone=isTaskDone(task);task.pieces.push(newPiece(KIND.CONTINUE));refreshKinds(task);recalcTask(task);if(wasDone)resetTimer(TIMER.FOCUS);saveState();renderAll();toast("스텝을 하나 늘렸어요.")}
    function removeOnePiece(){
      var task=activeTask();if(!task)return;
      if(task.pieces.length<=1){toast("마지막 스텝은 삭제할 수 없어요.");return}
      var wasDone=isTaskDone(task),removeIndex=findLastPendingIndex(task);
      if(removeIndex<0){toast("줄일 수 있는 예정 스텝이 없어요.");return}
      task.pieces.splice(removeIndex,1);refreshKinds(task);recalcTask(task);var nowDone=isTaskDone(task);if(nowDone)resetTimer(TIMER.FOCUS);saveState();renderAll();
      if(!wasDone&&nowDone){toast("남은 스텝을 줄여서 완료했어요.");showCelebration()}else toast("예정 스텝을 하나 줄였어요.");
    }
    function setTaskCount(task,target){
      if(!task)return;
      target=clamp(target,1,6);
      var before=task.pieces.length;
      if(target===before)return;
      if(target>before){
        while(task.pieces.length<target)task.pieces.push(newPiece(KIND.CONTINUE));
        toast("스텝 수를 조정했어요.");
      }else{
        while(task.pieces.length>target){
          var removeIndex=findLastPendingIndex(task);
          if(removeIndex<0){toast("줄일 수 있는 예정 스텝이 없어요.");break}
          task.pieces.splice(removeIndex,1);
        }
        if(task.pieces.length!==before)toast("스텝 수를 조정했어요.");
      }
      refreshKinds(task);
      recalcTask(task);
      resetTimer(TIMER.FOCUS);
      saveState();
      renderCurrent();
    }

    function deleteTask(taskId){
      if(armedDeleteId!==taskId){armedDeleteId=taskId;renderCurrent();return}
      state.tasks=state.tasks.filter(function(task){return task.id!==taskId});if(state.activeId===taskId){state.activeId=null;resetTimer(TIMER.FOCUS)}armedDeleteId=null;saveState();renderAll();toast("삭제했어요.");
    }
    function toggleStep(index){var task=activeTask(),piece=viewPiece(task);if(!piece||index<0||index>2)return;while(piece.done.length<3)piece.done.push(false);piece.done[index]=!piece.done[index];saveState();renderCurrent()}

    function renderAll(){renderScreen();renderAddControls();renderCurrent();autoGrowAll()}
    function renderScreen(){var add=state.screen==="add";el.addView.classList.toggle("active",add);el.doView.classList.toggle("active",!add);el.topBtn.textContent=add?"닫기":"＋";el.topBtn.classList.toggle("close",add);el.subtitle.textContent=add?"새 할 일 만들기":"지금 할 것만 보기"}
    function renderAddControls(){el.addBtn.disabled=!clean(state.draft);el.prepInput.checked=!!state.prep;applyMemoGuide();all("[data-type]").forEach(function(btn){btn.classList.toggle("on",Number(btn.dataset.type)===state.type)});all("[data-count]").forEach(function(btn){btn.classList.toggle("on",Number(btn.dataset.count)===state.count)})}
    function syncInputs(){el.taskInput.value=state.draft;el.startInput.value=state.startText;el.memoInput.value=state.memoText;el.finishInput.value=state.finishText;el.prepInput.checked=!!state.prep;el.addBtn.disabled=!clean(state.draft);applyMemoGuide();autoGrow(el.memoInput)}
    function renderCurrent(){
      var task=activeTask();if(!task){renderEmptyCurrent();renderTaskList();return}
      if(task.settingsOpen){renderEditTask(task);return}
      if(isTaskDone(task)){renderDoneTask(task);return}
      var piece=viewPiece(task),viewIndex=clamp(task.view,0,Math.max(task.pieces.length-1,0)),isCurrent=viewIndex===task.now&&task.now<task.pieces.length;
      if(!piece){renderDoneTask(task);return}
      el.currentCard.innerHTML=renderTaskHeader(task,false,"")+renderMeta(task,isCurrent)+'<div class="bar">'+renderBar(task,true)+'</div><div class="steps">'+renderSteps(task,piece)+'</div>'+renderResultButtons("current",!isCurrent);
      bindCurrentCard(task,isCurrent);renderTaskList();updateTimerDom();autoGrowAll();
    }
    function renderEditTask(task){
      el.currentCard.innerHTML=renderEditForm(task);
      bindGear(task);bindInlineEditors(task);renderTaskList();autoGrowAll();
    }
    function renderEditForm(task){
      var prepEdit=canEditPrep(task)?'<label class="small-check"><input id="prepEditInput" type="checkbox" '+(task.prep?'checked':'')+' /><span>준비부터 필요함</span><small>첫 스텝을 준비로 시작</small></label>':'';
      return '<div class="edit-form"><div class="edit-top">'+renderTypeEditRow(task)+gearButton(true)+'</div>'+ 
        '<input class="add-title-field edit-title-field" id="titleEditInput" type="text" value="'+attr(task.title)+'" aria-label="제목 수정" autocomplete="off" />'+
        renderMemoEdit(task,false)+
        '<div class="edit-divider"></div><div class="edit-settings">'+
        '<div class="setting-section"><div class="label">시작·끝 기준</div><div class="range-box"><label class="range-row"><span>시작</span><input id="startEditInput" type="text" value="'+attr(task.startText)+'" placeholder="처음 볼 곳이나 손댈 것" autocomplete="off" /></label><label class="range-row"><span>끝</span><input id="finishEditInput" type="text" value="'+attr(task.finishText)+'" placeholder="이번에 어디까지 할지" autocomplete="off" /></label></div>'+prepEdit+'</div>'+ 
        '<div class="setting-section"><div class="label">전체 분량</div><div class="chips">'+renderCountChips(task)+'</div></div>'+ 
        '<div class="edit-actions"><button class="putaway-btn" id="putAwayBtn">↓ 보관함으로 내리기</button><button class="delete-btn '+(armedDeleteId===task.id?'armed':'')+'" id="deleteBtn">'+(armedDeleteId===task.id?'한 번 더 누르면 삭제':'이 할 일 삭제')+'</button></div>'+ 
        '</div></div>';
    }
    function renderTaskHeader(task,done,badgeText){
      var titlePart='<h2 class="now-title">'+safe(task.title||"할 일")+'</h2>';
      var badge=badgeText?'<div class="badge '+(done?'done':'')+'">'+badgeText+'</div>':'';
      return '<div class="now-head"><div class="title-line">'+typeBadge(task)+titlePart+'</div><div class="head-right">'+badge+gearButton(false)+'</div></div>';
    }
    function editSvg(open){
      return open?'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12"></path><path d="M18 6L6 18"></path></svg>':'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>';
    }
    function gearButton(open){return '<button class="gear '+(open?'on':'')+'" id="gearBtn" aria-label="'+(open?'편집 닫기':'할 일 편집')+'">'+editSvg(open)+'</button>'}
    function renderTypeEditRow(task){return '<div class="edit-type-row"><button class="chip '+(task.type===TYPE.STUDY?'on':'')+'" data-edit-type="0">공부</button><button class="chip '+(task.type===TYPE.ASSIGNMENT?'on':'')+'" data-edit-type="1">과제</button><button class="chip '+(task.type===TYPE.ETC?'on':'')+'" data-edit-type="2">기타</button></div>'}
    function renderCountChips(task){
      var total=task.pieces.length,html='';
      for(var i=1;i<=6;i++)html+='<button class="chip '+(total===i?'on':'')+'" data-edit-count="'+i+'">'+i+'스텝<small>'+(i===1?'30분':(i%2===0?i/2+'시간':(i/2).toFixed(1)+'시간'))+'</small></button>';
      return html;
    }
    function renderMeta(task,showTimer){
      var memo=renderMemo(task,false),timer=showTimer?renderTimer():"";
      if(!memo&&!timer)return"";
      return '<div class="meta-row '+(memo?"has-memo":"solo-timer")+'">'+memo+timer+'</div>';
    }
    function renderEmptyCurrent(){
      var hasStored=storedTasks().length>0,actionsClass=hasStored?"empty-actions":"empty-actions single";
      el.currentCard.innerHTML='<div class="label">지금 할 것</div><div class="empty"><strong>지금 할 일을 비워뒀어요</strong>쉬거나, 수업 가거나, 보관함에서 다시 골라도 됩니다.<div class="'+actionsClass+'"><button class="soft-action primary" id="emptyAddBtn">새 할 일 추가</button>'+(hasStored?'<button class="soft-action" id="emptyLibraryBtn">보관함 열기</button>':'')+'</div></div>';
      var add=byId("emptyAddBtn"),lib=byId("emptyLibraryBtn");if(add)add.onclick=openAddView;if(lib)lib.onclick=function(){state.libraryOpen=true;saveState();renderTaskList()};
    }
    function renderDoneTask(){
      var task=activeTask();
      if(task&&task.settingsOpen){renderEditTask(task);return}
      el.currentCard.innerHTML=renderTaskHeader(task,true,"완료")+renderMemo(task,true)+'<div class="bar">'+renderBar(task,true)+'</div><div class="done-box">할 일 완료<small>다음 할 일이 있으면 바로 이어가도 됩니다</small></div><div class="done-actions"><button class="done-action primary" id="doneAddBtn">새 할 일 추가</button><button class="done-action" id="doneClearBtn">지금 비워두기</button></div>';
      bindGear(task);bindDoneActions();renderTaskList();autoGrowAll();
    }
    function bindDoneActions(){var add=byId("doneAddBtn"),clear=byId("doneClearBtn");if(add)add.onclick=openAddView;if(clear)clear.onclick=putAwayCurrent}
    function renderMemo(task,standalone){return task.memoText?'<div class="memo-shell readonly '+(standalone?'standalone':'')+'"><span class="memo-label">메모</span><div class="memo-content">'+safe(task.memoText)+'</div></div>':''}
    function renderMemoEdit(task,standalone){var guide=memoGuide(task.type);return'<div class="memo-edit-block '+(standalone?'standalone':'')+'"><div class="add-field-label">메모</div><div class="memo-help">'+renderMemoHelp(task.type)+'</div><label class="memo-shell editable memo-edit-shell"><textarea class="memo-field" id="memoInlineInput" placeholder="'+attr(guide.placeholder)+'" rows="2">'+safe(task.memoText)+'</textarea></label></div>'}
    function renderSteps(task,piece){return stepsFor(task,piece).map(function(parts,index){var checked=!!piece.done[index];return'<button class="step '+(checked?'checked':'')+'" data-step="'+index+'"><div class="num">'+(checked?'✓':index+1)+'</div><div><span class="step-line">'+renderLine(parts)+'</span></div></button>'}).join("")}
    function renderLine(parts){return parts.map(function(part){var escaped=safe(part.text);return part.strong?'<strong>'+escaped+'</strong>':escaped}).join("")}
    function renderBar(task,interactive){
      var view=typeof task.view==="number"?task.view:task.now;
      return task.pieces.map(function(piece,index){var cls="seg "+piece.status;if(piece.status===STATUS.PENDING&&index===task.now)cls="seg current";if(interactive&&index===view)cls+=" viewing";return interactive?'<button class="'+cls+'" data-piece="'+index+'" aria-label="스텝 '+(index+1)+'"></button>':'<span class="'+cls+'"></span>'}).join("");
    }
    function renderResultButtons(prefix,locked){return'<div class="actions">'+resultButton("success",prefix+"-success","✓ 성공",locked)+resultButton("incomplete",prefix+"-incomplete","… 미완",locked)+resultButton("blocked",prefix+"-blocked","! 멈춤",locked)+'</div>'}
    function resultButton(cls,key,label,locked){return'<button class="result-btn '+cls+(locked?' locked" disabled':'"')+' data-hold="'+key+'"><span class="hold-fill"></span><span class="hold-label">'+label+'</span></button>'}
    function renderGearPanel(task){
      return'<div class="gear-panel '+(task.settingsOpen?'open':'')+'" id="gearPanel">'+
        '<div class="gear-section"><div class="gear-title">시작·끝 기준</div><div class="range-box"><label class="range-row"><span>시작</span><input id="startEditInput" type="text" value="'+attr(task.startText)+'" placeholder="처음 볼 곳이나 손댈 것" autocomplete="off" /></label><label class="range-row"><span>끝</span><input id="finishEditInput" type="text" value="'+attr(task.finishText)+'" placeholder="이번에 어디까지 할지" autocomplete="off" /></label></div></div>'+
        '<div class="gear-section"><div class="gear-title">전체 분량</div><div class="size-row"><button class="size-btn" id="minusPiece">− 스텝</button><button class="size-btn" id="plusPiece">＋ 스텝</button></div></div>'+
        '<button class="putaway-btn" id="putAwayBtn">↓ 보관함으로 내리기</button>'+
        '<button class="delete-btn '+(armedDeleteId===task.id?'armed':'')+'" id="deleteBtn">'+(armedDeleteId===task.id?'한 번 더 누르면 삭제':'이 할 일 삭제')+'</button></div>'
    }
    function bindCurrentCard(task,enableHold){
      bindGear(task);bindInlineEditors(task);bindTimer();
      all("[data-piece]",el.currentCard).forEach(function(btn){btn.onclick=function(){armedDeleteId=null;task.view=Number(btn.dataset.piece);saveState();renderCurrent()}});
      all("[data-step]",el.currentCard).forEach(function(btn){btn.onclick=function(){toggleStep(Number(btn.dataset.step))}});
      if(enableHold){bindHold('[data-hold="current-success"]',function(){markCurrent(STATUS.SUCCESS)},el.currentCard);bindHold('[data-hold="current-incomplete"]',function(){markCurrent(STATUS.INCOMPLETE)},el.currentCard);bindHold('[data-hold="current-blocked"]',function(){markCurrent(STATUS.BLOCKED)},el.currentCard)}
    }
    function bindInlineEditors(task){
      var titleInput=byId("titleEditInput"),memoInput=byId("memoInlineInput");
      if(titleInput){
        titleInput.addEventListener("focus",function(){titleBeforeEdit=task.title||"할 일"});
        titleInput.addEventListener("input",function(){if(clean(titleInput.value)){task.title=titleInput.value;saveState()}});
        titleInput.addEventListener("blur",function(){if(!clean(titleInput.value)){task.title=titleBeforeEdit||task.title||"할 일"}else{task.title=clean(titleInput.value)}saveState();renderCurrent()});
      }
      if(memoInput){
        autoGrow(memoInput);
        memoInput.addEventListener("input",function(){task.memoText=memoInput.value;autoGrow(memoInput);saveState()});
        memoInput.addEventListener("blur",function(){task.memoText=cleanMemo(memoInput.value);saveState();renderCurrent()});
      }
    }
    function bindGear(task){
      var gear=byId("gearBtn"),put=byId("putAwayBtn"),minus=byId("minusPiece"),plus=byId("plusPiece"),del=byId("deleteBtn"),startInput=byId("startEditInput"),finishInput=byId("finishEditInput"),prepInput=byId("prepEditInput");
      if(gear)gear.onclick=function(){armedDeleteId=null;task.settingsOpen=!task.settingsOpen;saveState();renderCurrent()};
      if(put)put.onclick=putAwayCurrent;
      if(minus)minus.onclick=removeOnePiece;
      if(plus)plus.onclick=addOnePiece;
      if(del)del.onclick=function(){deleteTask(task.id)};
      if(startInput){
        startInput.addEventListener("input",function(){task.startText=startInput.value;saveState()});
        startInput.addEventListener("blur",function(){task.startText=clean(startInput.value);saveState();renderCurrent()});
      }
      if(finishInput){
        finishInput.addEventListener("input",function(){task.finishText=finishInput.value;saveState()});
        finishInput.addEventListener("blur",function(){task.finishText=clean(finishInput.value);saveState();renderCurrent()});
      }
      if(prepInput){
        prepInput.addEventListener("change",function(){task.prep=prepInput.checked;refreshKinds(task);saveState();renderCurrent()});
      }
      all("[data-edit-type]",el.currentCard).forEach(function(btn){
        btn.onclick=function(){
          task.type=clamp(btn.dataset.editType,TYPE.STUDY,TYPE.ETC);
          refreshKinds(task);
          saveState();
          renderCurrent();
        };
      });
      all("[data-edit-count]",el.currentCard).forEach(function(btn){
        btn.onclick=function(){setTaskCount(task,Number(btn.dataset.editCount))};
      });
    }
    function renderTaskList(){
      var tasks=storedTasks();if(!tasks.length){el.listCard.style.display="none";el.listCard.innerHTML="";return}
      el.listCard.style.display="block";el.listCard.innerHTML='<button class="library-toggle" id="libraryToggle"><span><strong>할 일 보관함</strong> '+tasks.length+'개</span><span class="chev">'+(state.libraryOpen?'⌄':'〉')+'</span></button>'+(state.libraryOpen?'<div class="tasks">'+tasks.map(renderTaskButton).join("")+'</div>':'');
      var toggle=byId("libraryToggle");if(toggle)toggle.onclick=function(){state.libraryOpen=!state.libraryOpen;saveState();renderTaskList()};all(".task",el.listCard).forEach(function(btn){btn.onclick=function(){selectTask(btn.dataset.id)}});
    }
    function renderTaskButton(task){var done=isTaskDone(task),note=cleanMemo(task.memoText),meta=done?'<div class="task-meta">완료</div>':'',topClass=done?'task-top':'task-top no-meta';return'<button class="task '+(done?'done':'')+'" data-id="'+task.id+'"><div class="'+topClass+'"><div class="task-title">'+typeBadge(task)+'<div class="task-name">'+safe(task.title)+'</div></div>'+meta+'</div>'+(note?'<div class="task-note">'+safe(note)+'</div>':'')+'<div class="bar">'+renderBar(task,false)+'</div></button>'}

    function bindHold(selector,onComplete,root){
      var button=(root||document).querySelector(selector);if(!button||button.disabled)return;
      var timer=null,raf=null,startTime=0,completed=false;
      function reset(){button.classList.remove("holding");button.style.setProperty("--hold",0)}
      function cleanup(){if(timer)clearTimeout(timer);if(raf)cancelAnimationFrame(raf);timer=null;raf=null;completed=false;reset()}
      function tick(){var ratio=Math.min((performance.now()-startTime)/HOLD_MS,1);button.style.setProperty("--hold",ratio);if(ratio<1&&!completed)raf=requestAnimationFrame(tick)}
      function start(event){if(button.disabled)return;event.preventDefault();cleanup();startTime=performance.now();button.classList.add("holding");raf=requestAnimationFrame(tick);timer=setTimeout(function(){if(completed)return;completed=true;button.style.setProperty("--hold",1);onComplete();cleanup()},HOLD_MS)}
      function cancel(event){if(event)event.preventDefault();cleanup()}
      button.addEventListener("pointerdown",start);
      button.addEventListener("pointerup",cancel);
      button.addEventListener("pointerleave",cancel);
      button.addEventListener("pointercancel",cancel);
      button.addEventListener("contextmenu",function(event){event.preventDefault()});
      button.addEventListener("keydown",function(event){if(event.key!==" "&&event.key!=="Enter")return;if(event.repeat)return;start(event)});
      button.addEventListener("keyup",function(event){if(event.key!==" "&&event.key!=="Enter")return;cancel(event)});
    }
    function focusTaskInput(){setTimeout(function(){el.taskInput.focus()},0)}
    function bindInput(input,key,after){input.addEventListener("input",function(){state[key]=input.value;if(input.tagName==="TEXTAREA")autoGrow(input);if(after)after();saveState()})}
    function bindStaticEvents(){
      bindInput(el.taskInput,"draft",function(){el.addBtn.disabled=!clean(state.draft)});
      bindInput(el.startInput,"startText");
      bindInput(el.memoInput,"memoText");
      bindInput(el.finishInput,"finishText");
      el.prepInput.addEventListener("change",function(){state.prep=el.prepInput.checked;saveState()});
      el.addBtn.onclick=addTask;
      all("[data-type]").forEach(function(btn){btn.onclick=function(){state.type=Number(btn.dataset.type);saveState();renderAddControls()}});
      all("[data-count]").forEach(function(btn){btn.onclick=function(){state.count=Number(btn.dataset.count);saveState();renderAddControls()}});
      el.topBtn.onclick=function(){armedDeleteId=null;state.screen=state.screen==="add"?"do":"add";saveState();renderScreen();renderAddControls();if(state.screen==="add"){syncInputs();focusTaskInput()}};
    }
    bindStaticEvents();syncInputs();renderAll();startTimerLoop();saveState();
  </script>
</body>
</html>
